<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Metaprogramas">
<title>Detector de Metaprogramas · Cris</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a2e1f;
    color: #f0f4f0;
    min-height: 100vh;
    padding: 0 0 40px 0;
  }

  header {
    background: linear-gradient(135deg, #1a2e1f, #2d5a3d);
    padding: 18px 16px 14px;
    border-bottom: 2px solid #4a7c59;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 17px;
    font-weight: 700;
    color: #a8d5b5;
    letter-spacing: 0.3px;
  }

  header p {
    font-size: 11px;
    color: #6a9e7a;
    margin-top: 2px;
  }

  .input-area {
    padding: 14px 14px 10px;
    background: #1f3526;
    border-bottom: 1px solid #2d4a35;
  }

  textarea {
    width: 100%;
    background: #0f1f14;
    border: 1.5px solid #3a6b4a;
    border-radius: 10px;
    color: #e8f5ec;
    font-size: 15px;
    line-height: 1.5;
    padding: 12px 14px;
    resize: none;
    min-height: 90px;
    outline: none;
    font-family: inherit;
  }

  textarea::placeholder { color: #4a7a5a; }
  textarea:focus { border-color: #6ab87a; }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn-detectar {
    flex: 1;
    background: #3a8a50;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
  }

  .btn-detectar:active { background: #2d7040; }

  .btn-limpiar {
    background: transparent;
    color: #6ab87a;
    border: 1.5px solid #3a6b4a;
    border-radius: 8px;
    padding: 11px 16px;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-limpiar:active { background: #1f3526; }

  /* Resultados */
  .resultados {
    padding: 14px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #4a7a5a;
    font-size: 14px;
    line-height: 1.6;
  }

  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

  .conteo {
    font-size: 12px;
    color: #6a9e7a;
    margin-bottom: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card {
    background: #1f3526;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    border: 1px solid #2d4a35;
  }

  .card-header {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .card-titulo {
    font-size: 14px;
    font-weight: 700;
    color: white;
    flex: 1;
  }

  .card-categoria {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .polo-badge {
    background: rgba(255,255,255,0.2);
    color: white;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .card-body {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .seccion-label {
    font-size: 10px;
    color: #6a9e7a;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    background: #0f1f14;
    border: 1px solid #3a6b4a;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
    color: #8acf9a;
    font-style: italic;
  }

  .pregunta {
    font-size: 13px;
    color: #c8e8d0;
    font-style: italic;
    line-height: 1.5;
  }

  .intervencion {
    font-size: 13px;
    color: #e0f0e4;
    line-height: 1.5;
    background: #0f1f14;
    border-radius: 8px;
    padding: 8px 10px;
    border-left: 3px solid;
  }

  .sin-deteccion {
    background: #1f3526;
    border-radius: 10px;
    padding: 16px;
    border: 1px dashed #3a6b4a;
    color: #6a9e7a;
    font-size: 13px;
    line-height: 1.6;
    text-align: center;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 10px;
    color: #3a6b4a;
    margin-top: 10px;
  }
</style>
</head>
<body>

<header>
  <h1>🧠 Detector de Metaprogramas</h1>
  <p>Cris · Uso en sesión</p>
</header>

<div class="input-area">
  <textarea id="input" placeholder="Escribí lo que va diciendo el consultante…" oninput="detectarEnVivo(this.value)"></textarea>
  <div class="btn-row">
    <button class="btn-detectar" onclick="detectar()">Detectar</button>
    <button class="btn-limpiar" onclick="limpiar()">Limpiar</button>
  </div>
</div>

<div class="resultados" id="resultados">
  <div class="empty-state">
    <div class="icon">✍️</div>
    Escribí lo que dice el consultante<br>y los metaprogramas aparecerán aquí.
  </div>
</div>

<footer>12 metaprogramas · Cris</footer>

let debounceTimer;

function detectarEnVivo(texto) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    if (texto.trim().length > 10) detectar();
  }, 600);
}

function detectar() {
  const texto = document.getElementById('input').value;
  if (!texto.trim()) return;

  const textoLower = texto.toLowerCase();
  const resultados = [];

  for (const mp of METAPROGRAMAS) {
    for (const [polo, frases] of Object.entries(mp.polos)) {
      const encontradas = frases.filter(f => textoLower.includes(f.toLowerCase()));
      if (encontradas.length > 0) {
        resultados.push({ mp, polo, encontradas });
      }
    }
  }

  renderResultados(resultados);
}

function renderResultados(resultados) {
  const div = document.getElementById('resultados');

  if (resultados.length === 0) {
    div.innerHTML = `<div class="sin-deteccion">No se detectaron metaprogramas claros.<br>Probá escribir más frases del consultante.</div>`;
    return;
  }

  let html = `<div class="conteo">${resultados.length} metaprograma${resultados.length > 1 ? 's' : ''} detectado${resultados.length > 1 ? 's' : ''}</div>`;

  for (const { mp, polo, encontradas } of resultados) {
    const tags = encontradas.map(f => `<span class="tag">"${f}"</span>`).join('');
    html += `
      <div class="card">
        <div class="card-header" style="background: ${mp.color}">
          <div>
            <div class="card-titulo">${mp.nombre}</div>
            <div class="card-categoria">${mp.categoria}</div>
          </div>
          <div class="polo-badge">${polo}</div>
        </div>
        <div class="card-body">
          <div>
            <div class="seccion-label">Indicadores detectados</div>
            <div class="tags">${tags}</div>
          </div>
          <div>
            <div class="seccion-label">Pregunta de disparo</div>
            <div class="pregunta">→ ${mp.pregunta}</div>
          </div>
          <div>
            <div class="seccion-label">Intervención sugerida</div>
            <div class="intervencion" style="border-color: ${mp.color}">${mp.intervencion[polo]}</div>
          </div>
        </div>
      </div>`;
  }

  div.innerHTML = html;
}

function limpiar() {
  document.getElementById('input').value = '';
  document.getElementById('resultados').innerHTML = `
    <div class="empty-state">
      <div class="icon">✍️</div>
      Escribí lo que dice el consultante<br>y los metaprogramas aparecerán aquí.
    </div>`;
}
</script>
